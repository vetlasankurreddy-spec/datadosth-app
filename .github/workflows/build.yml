name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Pub Get
        run: flutter pub get

      - name: Fix Old Android Project
        run: |
          sed -i 's/name: datadosth-app/name: datadosth_app/' pubspec.yaml
          flutter create . --platforms=android --project-name datadosth_app --overwrite
          flutter pub get

      - name: Build APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: datadosth-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
